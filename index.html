<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title> FlagMaster | Adivina la Bandera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,215,0,0.08) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        .game-container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 2;
        }

        /* Header del juego */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }

        .user-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .user-info:active {
            transform: scale(0.98);
        }

        .user-avatar {
            font-size: 32px;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 800;
            font-size: 18px;
        }

        .lives-container {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.1);
            padding: 10px 20px;
            border-radius: 60px;
        }

        .heart {
            font-size: 28px;
            transition: all 0.2s ease;
        }

        .heart.lost {
            opacity: 0.3;
            filter: grayscale(0.5);
        }

        .score-container {
            display: flex;
            gap: 15px;
        }

        .score-card {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            padding: 10px 20px;
            border-radius: 60px;
            text-align: center;
            color: white;
            min-width: 100px;
        }

        .score-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 26px;
            font-weight: 800;
            line-height: 1;
        }

        /* Bandera */
        .flag-container {
            width: 100%;
            max-width: 400px;
            height: 240px;
            margin: 20px auto;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #f5f7fa, #e9ecef);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flag-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Opciones */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 25px 0;
        }

        .option-btn {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            color: #2d3748;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            border-color: #667eea;
            background: #f7fafc;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #48bb78, #38a169);
            border-color: #2f855a;
            color: white;
            animation: pulse 0.5s ease;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            border-color: #c53030;
            color: white;
            animation: shake 0.3s ease;
        }

        .option-btn.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Mensajes */
        .message {
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            margin-top: 15px;
            font-weight: 600;
            animation: fadeInUp 0.3s ease;
        }

        .message.success {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }

        .message.error {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
        }

        .message.warning {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Modal */
        .modal {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: white;
            border-radius: 48px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #2d3748;
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-btn {
            padding: 12px 32px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .modal-btn:active {
            transform: scale(0.96);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            width: 100%;
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
        }

        .footer p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .footer .heart-icon {
            color: #ff6b6b;
            animation: pulseHeart 1.5s ease infinite;
            display: inline-block;
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @media (max-width: 550px) {
            .game-container {
                padding: 20px;
            }
            
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .flag-container {
                height: 180px;
            }
            
            .score-card {
                min-width: 80px;
                padding: 8px 12px;
            }
            
            .score-value {
                font-size: 20px;
            }
            
            .heart {
                font-size: 24px;
            }
            
            .user-info {
                padding: 8px 16px;
            }
            
            .user-avatar {
                font-size: 24px;
            }
            
            .user-name {
                font-size: 14px;
            }
            
            .footer p {
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .game-header {
                justify-content: center;
            }
            
            .score-container {
                width: 100%;
                justify-content: center;
            }
            
            .lives-container {
                order: -1;
            }
        }
    </style>
</head>
<body>
    <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="game-container">
            <div class="game-header">
                <div class="user-info" id="userInfoBtn">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name" id="userNameDisplay">Jugador</div>
                    </div>
                </div>
                <div class="lives-container" id="livesContainer">
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                </div>
                <div class="score-container">
                    <div class="score-card">
                        <div class="score-label">PUNTOS</div>
                        <div class="score-value" id="scoreValue">0</div>
                    </div>
                    <div class="score-card">
                        <div class="score-label">ACIERTOS</div>
                        <div class="score-value" id="correctCount">0</div>
                    </div>
                </div>
            </div>

            <div class="flag-container">
                <img id="flagImage" class="flag-img" alt="Bandera" style="display: none;">
                <div id="flagLoader" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Cargando bandera...</p>
                </div>
            </div>

            <div class="options-grid" id="optionsContainer"></div>
            <div id="messageArea" class="message"></div>
        </div>

        <div class="footer">
            <p> Desarrollado</span> por: <strong>Mario Jesús Delgado Hernández</strong></p>
        </div>
    </div>

    <div id="userModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-icon">👤</div>
            <div class="modal-title">Tu Nombre</div>
            <p style="color: #666; margin-bottom: 15px;">Ingresa tu nombre para personalizar la experiencia</p>
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Ingresa tu nombre" maxlength="20">
            </div>
            <button class="modal-btn" id="saveUserBtn"> COMENZAR A JUGAR</button>
        </div>
    </div>

    <div id="gameOverModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-icon" id="gameOverIcon">💀</div>
            <div class="modal-title" id="gameOverTitle">¡GAME OVER!</div>
            <div class="input-group">
                <p style="font-size: 18px; margin-bottom: 10px;">📊 <strong>Puntuación final:</strong> <span id="finalScoreSpan">0</span></p>
                <p style="font-size: 18px; margin-bottom: 20px;">✅ <strong>Aciertos:</strong> <span id="finalCorrectSpan">0</span></p>
            </div>
            <button class="modal-btn" id="playAgainBtn"> JUGAR DE NUEVO</button>
        </div>
    </div>

    <script>
        const FLAGS_API = 'https://restcountries.com/v3.1/all?fields=name,flags,translations';
        
        let allCountries = [];
        let currentCountry = null;
        let currentOptions = [];
        let score = 0;
        let correctAnswers = 0;
        let currentLives = 3;
        let currentUser = null;
        let answered = false;
        let isTransitioning = false;
        
        const flagImage = document.getElementById('flagImage');
        const flagLoader = document.getElementById('flagLoader');
        const optionsContainer = document.getElementById('optionsContainer');
        const scoreValueEl = document.getElementById('scoreValue');
        const correctCountEl = document.getElementById('correctCount');
        const messageArea = document.getElementById('messageArea');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const livesContainer = document.getElementById('livesContainer');
        const userModal = document.getElementById('userModal');
        const gameOverModal = document.getElementById('gameOverModal');
        const usernameInput = document.getElementById('usernameInput');
        const saveUserBtn = document.getElementById('saveUserBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const finalScoreSpan = document.getElementById('finalScoreSpan');
        const finalCorrectSpan = document.getElementById('finalCorrectSpan');
        const userInfoBtn = document.getElementById('userInfoBtn');
        
        function updateLivesDisplay() {
            livesContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const heart = document.createElement('span');
                heart.className = 'heart';
                heart.textContent = i < currentLives ? '❤️' : '🖤';
                if (i >= currentLives) heart.classList.add('lost');
                livesContainer.appendChild(heart);
            }
        }
        
        function loadCountries() {
            return new Promise(async (resolve) => {
                try {
                    showFlagLoader(true);
                    const response = await fetch(FLAGS_API);
                    const data = await response.json();
                    allCountries = data.map(country => ({
                        name: country.name.common,
                        nameEs: country.translations?.spa?.common || country.name.common,
                        flag: country.flags.png
                    }));
                    allCountries = allCountries.filter(c => c.name && c.name.length > 0);
                    shuffleArray(allCountries);
                    showFlagLoader(false);
                    resolve(true);
                } catch (error) {
                    console.error('Error:', error);
                    showFlagLoader(false);
                    resolve(false);
                }
            });
        }
        
        function showFlagLoader(show) {
            if (show) {
                flagImage.style.display = 'none';
                flagLoader.style.display = 'flex';
            } else {
                flagImage.style.display = 'block';
                flagLoader.style.display = 'none';
            }
        }
        
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }
        
        function generateOptions(correctCountry, allCountriesList) {
            const correctNameEs = correctCountry.nameEs;
            const options = [correctNameEs];
            const otherCountries = allCountriesList.filter(c => c.name !== correctCountry.name);
            shuffleArray(otherCountries);
            for (let i = 0; i < 3 && otherCountries.length > i; i++) {
                options.push(otherCountries[i].nameEs);
            }
            shuffleArray(options);
            return options;
        }
        
        async function loadNewQuestion() {
            if (allCountries.length === 0) {
                const success = await loadCountries();
                if (!success) {
                    showMessage('Error al cargar banderas', 'error');
                    return false;
                }
            }
            
            if (allCountries.length === 0) return false;
            
            const randomIndex = Math.floor(Math.random() * allCountries.length);
            currentCountry = allCountries[randomIndex];
            currentOptions = generateOptions(currentCountry, allCountries);
            
            showFlagLoader(true);
            return new Promise((resolve) => {
                flagImage.onload = () => {
                    showFlagLoader(false);
                    resolve(true);
                };
                flagImage.onerror = () => {
                    showFlagLoader(false);
                    flagImage.src = 'https://via.placeholder.com/400x240?text=Bandera';
                    resolve(true);
                };
                flagImage.src = currentCountry.flag;
            });
        }
        
        async function displayNewQuestion() {
            await loadNewQuestion();
            
            optionsContainer.innerHTML = '';
            const prefixes = ['A', 'B', 'C', 'D'];
            currentOptions.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span style="font-weight: 800; margin-right: 10px;">${prefixes[idx]}.</span> ${option}`;
                btn.addEventListener('click', () => checkAnswer(option, btn));
                optionsContainer.appendChild(btn);
            });
            
            answered = false;
            isTransitioning = false;
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('correct', 'wrong', 'disabled');
            });
        }
        
        function gameOver() {
            finalScoreSpan.textContent = score;
            finalCorrectSpan.textContent = correctAnswers;
            gameOverModal.classList.remove('hidden');
        }
        
        function resetGame() {
            score = 0;
            correctAnswers = 0;
            currentLives = 3;
            answered = false;
            isTransitioning = false;
            updateScoreDisplay();
            updateLivesDisplay();
            gameOverModal.classList.add('hidden');
            displayNewQuestion();
        }
        
        async function checkAnswer(selectedOption, buttonElement) {
            if (answered || isTransitioning) return;
            
            const isCorrect = (selectedOption === currentCountry.nameEs);
            
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(btn => {
                btn.disabled = true;
                btn.classList.add('disabled');
            });
            
            allButtons.forEach(btn => {
                if (btn.textContent.includes(currentCountry.nameEs)) {
                    btn.classList.add('correct');
                }
            });
            
            if (!isCorrect) {
                buttonElement.classList.add('wrong');
                currentLives--;
                updateLivesDisplay();
                showMessage(`❌ Incorrecto. Perdiste una vida. Respuesta: ${currentCountry.nameEs}`, 'error');
                answered = true;
                
                if (currentLives <= 0) {
                    showMessage('💀 ¡GAME OVER! Se acabaron tus vidas 💀', 'warning');
                    setTimeout(() => gameOver(), 1500);
                    return;
                } else {
                    isTransitioning = true;
                    setTimeout(() => {
                        displayNewQuestion();
                    }, 2000);
                }
            } else {
                buttonElement.classList.add('correct');
                const pointsEarned = 100;
                score += pointsEarned;
                correctAnswers++;
                showMessage(`🎉 ¡Correcto! +${pointsEarned} puntos`, 'success');
                updateScoreDisplay();
                answered = true;
                isTransitioning = true;
                setTimeout(() => {
                    displayNewQuestion();
                }, 800);
            }
        }
        
        function updateScoreDisplay() {
            scoreValueEl.textContent = score;
            correctCountEl.textContent = correctAnswers;
        }
        
        function showMessage(text, type) {
            messageArea.innerHTML = text;
            messageArea.className = `message ${type}`;
            setTimeout(() => {
                if (messageArea.innerHTML === text) {
                    messageArea.innerHTML = '';
                    messageArea.className = 'message';
                }
            }, 2000);
        }
        
        async function initGame(username) {
            currentUser = username;
            score = 0;
            correctAnswers = 0;
            currentLives = 3;
            answered = false;
            isTransitioning = false;
            
            updateScoreDisplay();
            updateLivesDisplay();
            userNameDisplay.textContent = username;
            
            if (allCountries.length === 0) {
                optionsContainer.innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando banderas...</p></div>';
                await loadCountries();
            }
            
            await displayNewQuestion();
        }
        
        function saveUser() {
            const username = usernameInput.value.trim();
            if (username.length === 0) {
                alert('Por favor ingresa un nombre');
                return;
            }
            if (username.length > 20) {
                alert('El nombre no puede tener más de 20 caracteres');
                return;
            }
            userModal.classList.add('hidden');
            initGame(username);
        }
        
        function restartGame() {
            gameOverModal.classList.add('hidden');
            if (currentUser) {
                score = 0;
                correctAnswers = 0;
                currentLives = 3;
                answered = false;
                isTransitioning = false;
                updateScoreDisplay();
                updateLivesDisplay();
                displayNewQuestion();
            }
        }
        
        function openUserModal() {
            userModal.classList.remove('hidden');
            usernameInput.value = currentUser || '';
        }
        
        saveUserBtn.addEventListener('click', saveUser);
        playAgainBtn.addEventListener('click', restartGame);
        userInfoBtn.addEventListener('click', openUserModal);
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveUser();
        });
        
        loadCountries();
        
        setTimeout(() => {
            if (!currentUser) {
                userModal.classList.remove('hidden');
            }
        }, 100);
    </script>
</body>
</html>
